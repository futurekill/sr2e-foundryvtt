name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      # package-lock.json is git-ignored in this repo, so install (not ci).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run the Node rules test suite
        run: npm test
